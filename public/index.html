<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Özel Görüntülü Görüşme</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div id="loginScreen">

<h2>
Özel Odaya Giriş
</h2>

<input
id="roomInput"
placeholder="Oda Adı"
>

<input
id="passwordInput"
type="password"
placeholder="Şifre"
>

<button id="joinBtn">
Odaya Gir
</button>

</div>

<video
id="remoteVideo"
autoplay
playsinline>
</video>

<video
id="myVideo"
autoplay
playsinline
muted>
</video>

<div id="topControls">

<button id="cameraBtn">
📷 Açık
</button>

<button id="micBtn">
🎤 Açık
</button>

<button id="chatToggle">
💬 Mesaj
</button>

<div id="volumeBox">

🔊

<input
type="range"
id="volumeSlider"
min="0"
max="100"
value="0"
>

</div>

</div>

<div id="chatPanel">

<div id="messages"></div>

<div id="emojiBar">

<span class="emoji">😀</span>
<span class="emoji">😂</span>
<span class="emoji">😍</span>
<span class="emoji">😎</span>
<span class="emoji">👍</span>
<span class="emoji">❤️</span>
<span class="emoji">🔥</span>
<span class="emoji">🎉</span>

</div>

<div id="inputArea">

<input
id="messageInput"
placeholder="Mesaj yaz..."
autocomplete="off"
>

<button id="sendBtn">
Gönder
</button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script src="script.js"></script>

</body>
</html>
