<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Görüntülü Görüşme</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="roomScreen">

<h2>Odaya Katıl</h2>

<input
id="roomName"
placeholder="Oda adı">

<input
id="roomPassword"
type="password"
placeholder="Oda şifresi">

<button id="joinBtn">
Odaya Gir
</button>

</div>

<div id="mainScreen">

<video
id="remoteVideo"
autoplay
playsinline>
</video>

<video
id="myVideo"
autoplay
playsinline
muted>
</video>

<div id="topBar">

<button id="micBtn">
🎤 Açık
</button>

<button id="camBtn">
📷 Açık
</button>

<button id="switchCameraBtn">
🔄 Kamera Çevir
</button>

<button id="soundBtn">
🔊 Kapalı
</button>

<input
type="range"
id="volumeSlider"
min="0"
max="1"
step="0.01"
value="0">

<select id="qualitySelect">

<option value="360">
360p Tasarruf
</option>

<option value="480">
480p
</option>

<option value="720" selected>
720p HD
</option>

<option value="1080">
1080p Full HD
</option>

</select>

<button id="fullscreenBtn">
🖥 Tam Ekran
</button>

<button id="shareScreenBtn">
📺 Ekran Paylaş
</button>

<button id="changePasswordBtn">
🔐 Şifre Değiştir
</button>

<button id="chatToggle">
💬 Mesaj
</button>

</div>

<div id="statusBar">

<div
id="pingBox"
class="statusBox">

Ping:
<span id="pingValue">
-
</span>

</div>

<div
id="qualityBox"
class="statusBox">

Bağlantı:
<span id="connectionQuality">
-
</span>

</div>

</div>

<div id="emojiPanel">

<span>😀</span>
<span>😁</span>
<span>😂</span>
<span>🤣</span>
<span>😊</span>
<span>😍</span>
<span>😘</span>
<span>😎</span>
<span>🤔</span>
<span>😢</span>
<span>😭</span>
<span>😡</span>
<span>👍</span>
<span>👎</span>
<span>👏</span>
<span>❤️</span>

</div>

<div id="chatPanel">

<div id="messages"></div>

<div id="inputArea">

<input
id="messageInput"
placeholder="Mesaj yaz...">

<button id="sendBtn">
Gönder
</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script src="script.js"></script>

</body>
</html>
